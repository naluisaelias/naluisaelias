name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *" 
  workflow_dispatch: 
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: naluisaelias
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: naluisaelias
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#A9FEF7&color_dots=#162A3D,#420a21,#791238,#ad1950,#FE428E
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
